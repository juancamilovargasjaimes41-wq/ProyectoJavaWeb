<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Store - Carrito</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a; color: #e0e0e0; min-height: 100vh;
        }
        nav {
            background: rgba(10, 10, 26, 0.95); backdrop-filter: blur(10px);
            padding: 0 2rem; display: flex; justify-content: space-between;
            align-items: center; height: 70px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
        }
        .nav-brand { display: flex; align-items: center; gap: 0.6rem; font-size: 1.5rem; font-weight: 800; color: #fff; text-decoration: none; }
        .nav-brand span { background: linear-gradient(135deg, #7c3aed, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-brand .icon { -webkit-text-fill-color: initial; color: #7c3aed; }
        .nav-links { display: flex; align-items: center; gap: 1.5rem; list-style: none; }
        .nav-links a { color: #a0a0b8; text-decoration: none; font-weight: 500; transition: color 0.3s; font-size: 0.9rem; }
        .nav-links a:hover { color: #7c3aed; }
        .nav-links .cart-link { position: relative; }
        .nav-links .cart-count {
            position: absolute; top: -8px; right: -10px;
            background: #7c3aed; color: #fff; font-size: 0.7rem;
            padding: 2px 6px; border-radius: 50%; font-weight: 700;
        }
        .nav-links .btn-login { padding: 0.4rem 1.2rem; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 0.85rem; }
        .nav-links .btn-logout { padding: 0.4rem 1.2rem; background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
        .nav-links .btn-logout:hover { background: rgba(239, 68, 68, 0.25); }
        .container { max-width: 900px; margin: 0 auto; padding: 3rem 2rem; }
        h1 { font-size: 1.8rem; margin-bottom: 2rem; }
        h1 span { background: linear-gradient(135deg, #7c3aed, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .empty-cart { text-align: center; padding: 4rem 2rem; }
        .empty-cart .icon { font-size: 4rem; margin-bottom: 1rem; }
        .empty-cart p { color: #6666aa; margin-bottom: 1.5rem; }
        .empty-cart .btn { display: inline-block; padding: 0.7rem 1.8rem; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; }
        .cart-items { display: flex; flex-direction: column; gap: 1rem; }
        .cart-item {
            display: flex; align-items: center; gap: 1.2rem;
            background: linear-gradient(145deg, #12122a, #1a1a3a);
            border-radius: 12px; padding: 1rem 1.5rem;
            border: 1px solid rgba(124, 58, 237, 0.1);
        }
        .cart-item img { width: 60px; height: 70px; object-fit: cover; border-radius: 8px; }
        .cart-item .item-info { flex: 1; }
        .cart-item .item-info .title { font-weight: 700; color: #fff; margin-bottom: 0.2rem; }
        .cart-item .item-info .price { color: #10b981; font-weight: 700; }
        .cart-item .item-qty { display: flex; align-items: center; gap: 0.5rem; color: #8888aa; }
        .cart-item .item-qty span { color: #e0e0e0; font-weight: 700; }
        .cart-item .item-subtotal { font-size: 1.1rem; font-weight: 700; color: #10b981; min-width: 80px; text-align: right; }
        .cart-item .btn-remove { padding: 0.3rem 0.8rem; background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
        .cart-item .btn-remove:hover { background: rgba(239, 68, 68, 0.25); }
        .cart-summary {
            margin-top: 2rem; padding: 1.5rem 2rem;
            background: linear-gradient(145deg, #12122a, #1a1a3a);
            border-radius: 12px; border: 1px solid rgba(124, 58, 237, 0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .cart-summary .total-label { color: #8888aa; }
        .cart-summary .total-value { font-size: 1.5rem; font-weight: 800; color: #10b981; }
        .cart-summary .btn-checkout {
            padding: 0.8rem 2rem; background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff; border: none; border-radius: 10px; font-size: 1rem;
            font-weight: 700; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s;
        }
        .cart-summary .btn-checkout:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4); }
        .alert { padding: 0.8rem 1.2rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
        .alert-error { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        @media (max-width: 600px) {
            .cart-item { flex-wrap: wrap; }
            .cart-summary { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/tienda" class="nav-brand">
            <span class="icon">&#x1F3AE;</span> <span>Pixel Store</span>
        </a>
        <ul class="nav-links">
            <li><a href="/tienda">Tienda</a></li>
            <li><a href="/cuenta">Mi Cuenta</a></li>
            <li class="cart-link">
                <a href="/carrito">&#x1F6D2; Carrito</a>
                <span class="cart-count" th:if="${session.cart != null and #lists.size(session.cart) > 0}" th:text="${#lists.size(session.cart)}">0</span>
            </li>
            <li>
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="btn-logout">Cerrar Sesión</button>
                </form>
            </li>
        </ul>
    </nav>

    <div class="container">
        <h1><span>&#x1F6D2;</span> Tu Carrito</h1>

        <div th:if="${error}" class="alert alert-error" th:text="${error}">Error</div>

        <div class="empty-cart" th:if="${session.cart == null or #lists.isEmpty(session.cart)}">
            <div class="icon">&#x1F6D2;</div>
            <p>Tu carrito está vacío. Explora la tienda y agrega tus juegos favoritos.</p>
            <a href="/tienda" class="btn">Ir a la Tienda</a>
        </div>

        <div th:if="${session.cart != null and not #lists.isEmpty(session.cart)}">
            <div class="cart-items">
                <div class="cart-item" th:each="item, stat : ${session.cart}">
                    <img th:src="${item.imagenUrl}" th:alt="${item.titulo}">
                    <div class="item-info">
                        <div class="title" th:text="${item.titulo}">Título</div>
                        <div class="price" th:text="'$' + ${item.precio} + ' c/u'">$00.00</div>
                    </div>
                    <div class="item-qty">Cant: <span th:text="${item.cantidad}">1</span></div>
                    <div class="item-subtotal" th:text="'$' + ${item.subtotal}">$00.00</div>
                    <form th:action="@{/carrito/eliminar/{index}(index=${stat.index})}" method="post" style="margin:0;">
                        <button type="submit" class="btn-remove">&#x2716;</button>
                    </form>
                </div>
            </div>

            <div class="cart-summary">
                <div>
                    <div class="total-label">Total</div>
                    <div class="total-value" th:text="'$' + ${total}">$00.00</div>
                </div>
                <form th:action="@{/carrito/pagar}" method="post">
                    <button type="submit" class="btn-checkout">Finalizar Compra</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
