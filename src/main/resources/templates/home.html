<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Store - Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
        }
        nav {
            background: rgba(10, 10, 26, 0.95); backdrop-filter: blur(10px);
            padding: 0 2rem; display: flex;
            justify-content: space-between; align-items: center; height: 70px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
        }
        .nav-brand {
            display: flex; align-items: center; gap: 0.6rem;
            font-size: 1.4rem; font-weight: 800; color: #fff; text-decoration: none;
        }
        .nav-brand span { background: linear-gradient(135deg, #7c3aed, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-brand .icon { -webkit-text-fill-color: initial; color: #7c3aed; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .nav-right .user-info { color: #8888aa; font-size: 0.9rem; }
        .nav-right .user-info strong { color: #e0e0e0; }
        .nav-right form { margin: 0; }
        .nav-right .btn-logout {
            padding: 0.5rem 1.2rem; background: rgba(239, 68, 68, 0.15);
            color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
            transition: background 0.3s;
        }
        .nav-right .btn-logout:hover { background: rgba(239, 68, 68, 0.25); }
        .container {
            display: flex; align-items: center; justify-content: center;
            min-height: calc(100vh - 70px); padding: 2rem;
        }
        .card {
            background: linear-gradient(145deg, #12122a, #1a1a3a);
            padding: 3rem; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center; max-width: 520px; width: 100%;
            border: 1px solid rgba(124, 58, 237, 0.1);
        }
        .card .welcome-icon { font-size: 3rem; margin-bottom: 1rem; }
        .card h1 { color: #fff; margin-bottom: 0.5rem; font-size: 1.6rem; }
        .card p { color: #8888aa; margin-bottom: 1.5rem; font-size: 1rem; line-height: 1.5; }
        .badge {
            display: inline-block; padding: 0.3rem 1rem; border-radius: 20px;
            font-weight: 600; font-size: 0.85rem; margin-bottom: 1.5rem;
        }
        .badge-admin { background: rgba(124, 58, 237, 0.2); color: #a78bfa; border: 1px solid rgba(124, 58, 237, 0.3); }
        .badge-user { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .username { font-weight: 700; background: linear-gradient(135deg, #7c3aed, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card .btn-store {
            display: inline-block; padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff; text-decoration: none; border-radius: 8px;
            font-weight: 600; transition: transform 0.3s, box-shadow 0.3s;
        }
        .card .btn-store:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4); }
    </style>
</head>
<body>
    <nav>
        <a href="/tienda" class="nav-brand">
            <span class="icon">&#x1F3AE;</span>
            <span>Pixel Store</span>
        </a>
        <div class="nav-right">
            <span class="user-info"><strong th:text="${#authentication.name}">usuario</strong></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn-logout">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="welcome-icon">&#x1F44B;</div>
            <h1>Bienvenido, <span class="username" th:text="${#authentication.name}">usuario</span></h1>
            <p>Has iniciado sesión en Pixel Store. Explora nuestro catálogo y encuentra tu próximo juego favorito.</p>
            <div>
                <span class="badge"
                      th:classappend="${#strings.contains(#authentication.authorities, 'ROLE_ADMIN')} ? 'badge-admin' : 'badge-user'"
                      th:text="${#strings.contains(#authentication.authorities, 'ROLE_ADMIN')} ? 'ADMINISTRADOR' : 'CLIENTE'">
                </span>
            </div>
            <a href="/tienda" class="btn-store">Ir a la Tienda</a>
        </div>
    </div>
</body>
</html>
