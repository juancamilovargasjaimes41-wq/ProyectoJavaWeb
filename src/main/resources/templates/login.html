<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-container {
            background: white; padding: 2.5rem; border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px;
        }
        h1 { text-align: center; margin-bottom: 1.5rem; color: #333; font-size: 1.8rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; color: #555; font-weight: 500; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 0.75rem; border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 1rem; transition: border-color 0.3s;
        }
        input:focus { border-color: #667eea; outline: none; }
        button {
            width: 100%; padding: 0.75rem; background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 8px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        .error { color: #e74c3c; text-align: center; margin-bottom: 1rem; }
        .logout { color: #2ecc71; text-align: center; margin-bottom: 1rem; }
        .info { text-align: center; margin-top: 1rem; color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Iniciar Sesión</h1>

        <div th:if="${param.error}" class="error">
            Usuario o contraseña incorrectos
        </div>
        <div th:if="${param.logout}" class="logout">
            Sesión cerrada correctamente
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Ingresar</button>
        </form>

        <div class="info">
            <p><strong>admin</strong> / admin123</p>
            <p><strong>user</strong> / user123</p>
        </div>
    </div>
</body>
</html>
