<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Store - Crear Cuenta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(124, 58, 237, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
        }
        .register-container {
            position: relative; background: linear-gradient(145deg, #12122a, #1a1a3a);
            padding: 2.5rem; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 100%; max-width: 440px; margin: 1rem;
            border: 1px solid rgba(124, 58, 237, 0.15);
        }
        .brand {
            text-align: center; margin-bottom: 1.5rem;
            font-size: 1.6rem; font-weight: 800; color: #fff;
        }
        .brand .icon { color: #7c3aed; }
        .brand span { background: linear-gradient(135deg, #7c3aed, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h1 { text-align: center; margin-bottom: 1.5rem; color: #e0e0e0; font-size: 1.3rem; font-weight: 600; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; color: #8888aa; font-weight: 500; font-size: 0.9rem; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 0.75rem; background: #0a0a1a;
            border: 1px solid rgba(124, 58, 237, 0.2); border-radius: 8px;
            font-size: 1rem; color: #e0e0e0; transition: border-color 0.3s;
        }
        input:focus { border-color: #7c3aed; outline: none; box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1); }
        button {
            width: 100%; padding: 0.75rem; background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white; border: none; border-radius: 8px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4); }
        .error { color: #ef4444; text-align: center; margin-bottom: 1rem; font-size: 0.9rem; }
        .back-link {
            display: block; text-align: center; margin-top: 1rem;
            color: #6666aa; text-decoration: none; font-size: 0.9rem; transition: color 0.3s;
        }
        .back-link:hover { color: #7c3aed; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="brand">
            <span class="icon">&#x1F3AE;</span> <span>Pixel Store</span>
        </div>
        <h1>Crear Cuenta</h1>

        <div th:if="${error}" class="error" th:text="${error}">Error</div>

        <form th:action="@{/registro}" method="post">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required minlength="4">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="4">
            </div>
            <button type="submit">Crear Cuenta</button>
        </form>

        <a href="/login" class="back-link">&larr; Ya tengo cuenta</a>
    </div>
</body>
</html>
